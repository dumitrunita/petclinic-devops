---
- name: Create systemd service
  ansible.builtin.template:
    src: petclinic.service.j2
    dest: "/etc/systemd/system/{{ service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable service
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    enabled: true